<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constantin's Training Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-void: #000000;
            --bg-primary: #0a0a0b;
            --bg-secondary: #0d0d0f;
            --bg-card: #111113;
            --bg-input: #18181b;
            --bg-hover: #1e1e22;
            --border: rgba(255, 255, 255, 0.08);
            --border-solid: #222228;
            --text-primary: #f4f4f6;
            --text-secondary: #a1a1aa;
            --text-muted: #52525b;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.15);
            --accent-soft: #7dd3fc;
            --green: #22c55e;
            --green-dim: rgba(34, 197, 94, 0.15);
            --yellow: #eab308;
            --yellow-dim: rgba(234, 179, 8, 0.15);
            --red: #ef4444;
            --red-dim: rgba(239, 68, 68, 0.15);
            --user-bg: #111110;
            --agent-bg: #0d0d0f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-void);
            color: var(--text-primary);
            height: 100vh;
            display: grid;
            grid-template-rows: 52px 1fr;
            overflow: hidden;
        }

        /* ================================================================
           HEADER
        ================================================================ */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-void);
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, var(--accent), #0ea5e9);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: 0 0 16px var(--accent-glow);
            flex-shrink: 0;
        }

        .header-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-primary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 4px;
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.15);
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--green);
        }

        .status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s ease-in-out infinite;
        }

        .clear-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: color 0.15s ease;
            letter-spacing: 0.02em;
        }

        .clear-btn:hover { color: var(--text-secondary); }

        /* Mobile toggle buttons */
        .mobile-toggle {
            display: none;
            gap: 4px;
        }

        .toggle-btn {
            background: none;
            border: 1px solid var(--border-solid);
            color: var(--text-secondary);
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 4px;
            transition: all 0.15s ease;
        }

        .toggle-btn.active {
            background: var(--bg-card);
            color: var(--text-primary);
            border-color: var(--border-solid);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ================================================================
           SPLIT LAYOUT
        ================================================================ */
        .app-body {
            display: grid;
            grid-template-columns: 58fr 42fr;
            overflow: hidden;
            height: 100%;
        }

        /* ================================================================
           DASHBOARD PANEL
        ================================================================ */
        .dashboard-panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid var(--border);
            background: var(--bg-void);
        }

        /* Race bar */
        .race-bar {
            flex-shrink: 0;
            height: 36px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-secondary);
            gap: 8px;
            white-space: nowrap;
            overflow: hidden;
        }

        .race-bar .sep { color: var(--text-muted); }
        .race-bar .phase-tag {
            color: var(--accent-soft);
            background: var(--accent-glow);
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 10px;
        }
        .race-bar .readiness-score { font-weight: 600; }
        .readiness-green { color: var(--green); }
        .readiness-yellow { color: var(--yellow); }
        .readiness-red { color: var(--red); }

        /* Metrics strip */
        .metrics-strip {
            flex-shrink: 0;
            height: 30px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
            gap: 6px;
        }

        .metrics-strip .metric-label { color: var(--text-muted); }
        .metrics-strip .metric-val { color: var(--text-secondary); }
        .metrics-strip .tsb-pos { color: var(--green); }
        .metrics-strip .tsb-neg { color: var(--yellow); }
        .metrics-strip .tsb-heavy { color: var(--red); }

        /* Section label */
        .section-label {
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            padding: 12px 20px 6px;
            flex-shrink: 0;
        }

        /* Today hero */
        .today-hero {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 16px;
            padding: 8px 20px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            align-items: start;
        }

        .recovery-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--border-solid);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .recovery-score-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            font-weight: 600;
            line-height: 1;
        }

        .recovery-score-pct {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .today-stats {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-top: 2px;
        }

        .stat-pills {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 4px 8px;
        }

        .stat-pill-label {
            font-size: 9px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-pill-val {
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-primary);
            font-weight: 600;
        }

        .last-activity-line {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .last-activity-line .sport-icon { font-size: 14px; }

        .last-activity-line .act-name {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 13px;
        }

        .last-activity-line .act-stats {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .hr-source-badge {
            font-size: 9px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            background: var(--bg-card);
            padding: 1px 4px;
            border-radius: 3px;
            border: 1px solid var(--border);
        }

        /* Activities feed */
        .activities-section {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }

        .activities-feed {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 8px;
        }

        .activities-feed::-webkit-scrollbar { width: 3px; }
        .activities-feed::-webkit-scrollbar-track { background: transparent; }
        .activities-feed::-webkit-scrollbar-thumb { background: var(--border-solid); border-radius: 2px; }

        .activity-card {
            display: grid;
            grid-template-columns: 32px 1fr auto;
            gap: 10px;
            align-items: center;
            padding: 9px 10px;
            border-radius: 6px;
            margin-bottom: 2px;
            cursor: default;
            transition: background 0.12s ease;
        }

        .activity-card:hover { background: var(--bg-card); }

        .activity-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
        }

        .activity-main {}

        .activity-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .activity-date {
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-secondary);
        }

        .activity-stats {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-secondary);
            text-align: right;
            white-space: nowrap;
        }

        .activity-stats .hr-val { color: var(--accent-soft); }

        /* Week summary */
        .week-summary {
            flex-shrink: 0;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 10px 20px;
            gap: 0;
        }

        .week-sport {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 0 8px;
        }

        .week-sport:first-child { padding-left: 0; }
        .week-sport:last-child { padding-right: 0; }
        .week-sport:not(:last-child) { border-right: 1px solid var(--border); }

        .week-sport-icon { font-size: 16px; }

        .week-sport-data {}

        .week-sport-label {
            font-size: 9px;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .week-sport-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .week-sport-val.dim { color: var(--text-muted); }

        /* ================================================================
           SKELETON LOADERS
        ================================================================ */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .skeleton {
            background: linear-gradient(
                90deg,
                var(--bg-card) 25%,
                var(--bg-hover) 50%,
                var(--bg-card) 75%
            );
            background-size: 200% 100%;
            animation: shimmer 1.8s ease-in-out infinite;
            border-radius: 4px;
        }

        .sk-line { height: 10px; }
        .sk-ring { width: 80px; height: 80px; border-radius: 50%; }
        .sk-pill { width: 72px; height: 32px; border-radius: 4px; }
        .sk-activity { height: 50px; border-radius: 6px; margin-bottom: 2px; }

        /* ================================================================
           CHAT PANEL
        ================================================================ */
        .chat-panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-primary);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar { width: 3px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--border-solid); border-radius: 2px; }

        .welcome-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--accent), #0ea5e9);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 32px var(--accent-glow);
        }

        .welcome-text { text-align: center; }

        .welcome-text h2 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        .welcome-text p {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.5;
            max-width: 280px;
        }

        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            max-width: 340px;
        }

        .chip {
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid var(--border-solid);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: 'DM Sans', sans-serif;
        }

        .chip:hover {
            border-color: var(--accent);
            color: var(--accent-soft);
            background: var(--accent-glow);
        }

        /* Messages */
        .message {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            animation: msgIn 0.25s ease;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message.agent .msg-avatar {
            background: linear-gradient(135deg, var(--accent), #0ea5e9);
        }

        .message.user .msg-avatar {
            background: var(--bg-card);
            border: 1px solid var(--border-solid);
        }

        .msg-content {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.65;
            max-width: 82%;
        }

        .message.user .msg-content {
            background: var(--user-bg);
            border: 1px solid #1f1f1a;
            color: var(--text-primary);
            border-radius: 10px 10px 2px 10px;
        }

        .message.agent .msg-content {
            background: var(--agent-bg);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 10px 10px 10px 2px;
        }

        .msg-content strong { color: var(--accent-soft); font-weight: 600; }
        .msg-content p { margin-bottom: 7px; }
        .msg-content p:last-child { margin-bottom: 0; }

        /* Markdown in messages */
        .msg-content h2 {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent-soft);
            margin: 12px 0 5px;
            letter-spacing: -0.1px;
        }

        .msg-content h3 {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin: 8px 0 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .msg-content ul, .msg-content ol {
            padding-left: 16px;
            margin: 5px 0;
        }

        .msg-content li { margin-bottom: 3px; line-height: 1.5; }

        .msg-content pre {
            background: #080808;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            overflow-x: auto;
            margin: 7px 0;
        }

        .msg-content code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            background: rgba(249, 115, 22, 0.08);
            padding: 1px 4px;
            border-radius: 3px;
            color: var(--accent-soft);
        }

        .msg-content pre code {
            background: none;
            padding: 0;
            color: #d4d4d8;
            font-size: 11px;
        }

        /* Loading dots */
        .loading-dots {
            display: flex;
            gap: 4px;
            padding: 3px 0;
        }

        .loading-dots span {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: dotBounce 1.2s ease-in-out infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes dotBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        /* Input area */
        .input-area {
            padding: 12px 16px 16px;
            border-top: 1px solid var(--border);
            background: var(--bg-primary);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-solid);
            border-radius: 10px;
            padding: 3px 3px 3px 14px;
            transition: border-color 0.15s ease;
        }

        .input-wrapper:focus-within {
            border-color: rgba(249, 115, 22, 0.4);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            padding: 9px 0;
        }

        .input-wrapper input::placeholder { color: var(--text-muted); }

        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, var(--accent), #0ea5e9);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            box-shadow: 0 0 14px var(--accent-glow);
            transform: scale(1.04);
        }

        .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .send-btn svg { width: 16px; height: 16px; }

        .input-hint {
            text-align: center;
            margin-top: 7px;
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }

        /* Dashboard error */
        .dash-error {
            padding: 16px 20px;
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        /* ================================================================
           RESPONSIVE
        ================================================================ */
        @media (max-width: 900px) {
            .app-body { grid-template-columns: 1fr; }
            .dashboard-panel { display: none; }
            .dashboard-panel.mobile-active { display: flex; }
            .chat-panel.mobile-hidden { display: none; }
            .mobile-toggle { display: flex; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="logo-icon">🏋</div>
            <div class="header-title">Constantin's Training Hub</div>
        </div>
        <div class="header-right">
            <div class="mobile-toggle">
                <button class="toggle-btn active" id="toggleDash" onclick="showPanel('dashboard')">Dashboard</button>
                <button class="toggle-btn" id="toggleChat" onclick="showPanel('chat')">Coach</button>
            </div>
            <button class="clear-btn" id="clearBtn" onclick="clearHistory()" style="display:none;">clear chat</button>
            <div class="status-badge" id="statusBadge">
                <div class="status-dot"></div>
                <span>connecting</span>
            </div>
        </div>
    </div>

    <!-- App body -->
    <div class="app-body">

        <!-- Dashboard panel -->
        <div class="dashboard-panel" id="dashboardPanel">
            <div class="race-bar" id="raceBar">
                <span class="skeleton sk-line" style="width:240px;"></span>
            </div>
            <div class="metrics-strip" id="metricsStrip">
                <span class="skeleton sk-line" style="width:180px;"></span>
            </div>

            <div class="section-label">Today</div>
            <div class="today-hero" id="todayHero">
                <div class="skeleton sk-ring"></div>
                <div style="display:flex;flex-direction:column;gap:8px;padding-top:4px;">
                    <div style="display:flex;gap:6px;">
                        <div class="skeleton sk-pill"></div>
                        <div class="skeleton sk-pill"></div>
                        <div class="skeleton sk-pill"></div>
                    </div>
                    <div class="skeleton sk-line" style="width:80%;"></div>
                </div>
            </div>

            <div class="activities-section">
                <div class="section-label">Recent Activities</div>
                <div class="activities-feed" id="activitiesFeed">
                    <div class="skeleton sk-activity"></div>
                    <div class="skeleton sk-activity"></div>
                    <div class="skeleton sk-activity"></div>
                    <div class="skeleton sk-activity"></div>
                </div>
            </div>

            <div class="week-summary" id="weekSummary">
                <div class="week-sport">
                    <div class="week-sport-icon">🏊</div>
                    <div class="week-sport-data">
                        <div class="week-sport-label">Swim</div>
                        <div class="skeleton sk-line" style="width:40px;"></div>
                    </div>
                </div>
                <div class="week-sport">
                    <div class="week-sport-icon">🚴</div>
                    <div class="week-sport-data">
                        <div class="week-sport-label">Bike</div>
                        <div class="skeleton sk-line" style="width:40px;"></div>
                    </div>
                </div>
                <div class="week-sport">
                    <div class="week-sport-icon">🏃</div>
                    <div class="week-sport-data">
                        <div class="week-sport-label">Run</div>
                        <div class="skeleton sk-line" style="width:40px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat panel -->
        <div class="chat-panel">
            <div class="chat-container" id="chatContainer">
                <div class="welcome-state" id="welcomeState">
                    <div class="welcome-icon">🚴</div>
                    <div class="welcome-text">
                        <h2>Coach is ready</h2>
                        <p>Ask me anything about your training. I'll pull your real data to give specific advice.</p>
                    </div>
                    <div class="suggestion-chips">
                        <button class="chip" onclick="sendSuggestion(this)">What's my current fitness level?</button>
                        <button class="chip" onclick="sendSuggestion(this)">Am I ready for race day?</button>
                        <button class="chip" onclick="sendSuggestion(this)">Should I train hard today?</button>
                        <button class="chip" onclick="sendSuggestion(this)">Plan next week's training</button>
                    </div>
                </div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <input
                        type="text"
                        id="messageInput"
                        placeholder="Ask your coach..."
                        autocomplete="off"
                        onkeydown="if(event.key==='Enter') sendMessage()"
                    >
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
                <div class="input-hint">Strava + Whoop + OpenAI</div>
            </div>
        </div>

    </div>

    <script>
        const API_BASE = '';
        const STORAGE_KEY = 'training_hub_history_v1';
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeState = document.getElementById('welcomeState');
        const clearBtn = document.getElementById('clearBtn');

        let isLoading = false;

        // ── Sport icons ──────────────────────────────────────────────────
        const SPORT_ICONS = {
            Swim: '🏊', Ride: '🚴', VirtualRide: '🚴',
            Run: '🏃', VirtualRun: '🏃', Walk: '🚶', Hike: '🥾',
            WeightTraining: '🏋', Workout: '💪',
        };
        function sportIcon(type) { return SPORT_ICONS[type] || '💪'; }

        // ── Conversation history ─────────────────────────────────────────
        function loadHistory() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
            catch (e) { return []; }
        }

        function saveHistory(h) {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(h)); } catch (e) {}
        }

        let conversationHistory = loadHistory();

        if (conversationHistory.length > 0) {
            welcomeState.remove();
            clearBtn.style.display = 'block';
            conversationHistory.forEach(msg => {
                renderMessage(msg.content, msg.role === 'user' ? 'user' : 'agent');
            });
        }

        function clearHistory() {
            conversationHistory = [];
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }

        // ── Mobile panel toggle ──────────────────────────────────────────
        function showPanel(which) {
            const dash = document.getElementById('dashboardPanel');
            const chat = document.querySelector('.chat-panel');
            const btnDash = document.getElementById('toggleDash');
            const btnChat = document.getElementById('toggleChat');
            if (which === 'dashboard') {
                dash.classList.add('mobile-active');
                chat.classList.add('mobile-hidden');
                btnDash.classList.add('active');
                btnChat.classList.remove('active');
            } else {
                dash.classList.remove('mobile-active');
                chat.classList.remove('mobile-hidden');
                btnChat.classList.add('active');
                btnDash.classList.remove('active');
            }
        }

        // ── Dashboard data loading ───────────────────────────────────────
        async function loadDashboard() {
            try {
                const res = await fetch(`${API_BASE}/api/dashboard`);
                if (!res.ok) throw new Error(res.status);
                const data = await res.json();
                renderRaceBar(data.race);
                renderMetricsStrip(data.metrics);
                renderTodayHero(data.today, data.last_activity);
                renderActivitiesFeed(data.recent_activities);
                renderWeekSummary(data.week_volume);
            } catch (err) {
                document.getElementById('raceBar').innerHTML =
                    '<span style="color:var(--text-muted);font-size:11px;">dashboard unavailable</span>';
                document.getElementById('metricsStrip').innerHTML = '';
                document.getElementById('todayHero').innerHTML =
                    '<div class="dash-error">Could not load data</div>';
                document.getElementById('activitiesFeed').innerHTML = '';
                document.getElementById('weekSummary').innerHTML = '';
            }
        }

        function renderRaceBar(race) {
            const el = document.getElementById('raceBar');
            if (!race) { el.innerHTML = '<span style="color:var(--text-muted);">race data unavailable</span>'; return; }
            const scoreClass = race.readiness_score >= 75 ? 'readiness-green'
                : race.readiness_score >= 55 ? 'readiness-yellow' : 'readiness-red';
            el.innerHTML = `
                <span>${race.weeks_to_race} wks to race</span>
                <span class="sep">·</span>
                <span class="phase-tag">${race.phase}</span>
                <span class="sep">·</span>
                <span>Readiness&nbsp;<span class="readiness-score ${scoreClass}">${race.readiness_score}</span>/100</span>
                <span class="sep">·</span>
                <span style="color:var(--text-muted);">${race.readiness_label}</span>
            `;
        }

        function renderMetricsStrip(m) {
            const el = document.getElementById('metricsStrip');
            if (!m) { el.innerHTML = ''; return; }
            const tsbClass = m.tsb > 5 ? 'tsb-pos' : m.tsb < -25 ? 'tsb-heavy' : 'tsb-neg';
            const tsbSign = m.tsb > 0 ? '+' : '';
            el.innerHTML = `
                <span class="metric-label">CTL</span>
                <span class="metric-val">${m.ctl}</span>
                <span style="color:var(--text-muted);margin:0 4px;">·</span>
                <span class="metric-label">ATL</span>
                <span class="metric-val">${m.atl}</span>
                <span style="color:var(--text-muted);margin:0 4px;">·</span>
                <span class="metric-label">TSB</span>
                <span class="metric-val ${tsbClass}">${tsbSign}${m.tsb}</span>
            `;
        }

        function renderTodayHero(today, lastActivity) {
            const el = document.getElementById('todayHero');
            // Recovery ring
            let ringColor = 'var(--border-solid)';
            let ringGlow = 'none';
            let scoreHtml = '<span style="color:var(--text-muted);font-size:16px;">—</span>';

            if (today) {
                const label = today.recovery_label;
                if (label === 'green') {
                    ringColor = 'var(--green)';
                    ringGlow = '0 0 20px rgba(34,197,94,0.25)';
                } else if (label === 'yellow') {
                    ringColor = 'var(--yellow)';
                    ringGlow = '0 0 20px rgba(234,179,8,0.25)';
                } else {
                    ringColor = 'var(--red)';
                    ringGlow = '0 0 20px rgba(239,68,68,0.25)';
                }
                const scoreColor = label === 'green' ? 'var(--green)' : label === 'yellow' ? 'var(--yellow)' : 'var(--red)';
                scoreHtml = `<span class="recovery-score-num" style="color:${scoreColor}">${today.recovery_score}</span>
                             <span class="recovery-score-pct">recovery</span>`;
            }

            // Stat pills
            const pills = [];
            if (today?.hrv_ms) pills.push(['HRV', `${today.hrv_ms}ms`]);
            if (today?.rhr_bpm) pills.push(['RHR', `${today.rhr_bpm}bpm`]);
            if (today?.sleep_hours) pills.push(['Sleep', `${today.sleep_hours}h`]);
            const pillsHtml = pills.map(([label, val]) =>
                `<div class="stat-pill"><span class="stat-pill-label">${label}</span><span class="stat-pill-val">${val}</span></div>`
            ).join('');

            // Last activity line
            let lastActHtml = '<span style="color:var(--text-muted);font-size:12px;">No recent activity</span>';
            if (lastActivity) {
                const icon = sportIcon(lastActivity.type);
                const stats = [
                    lastActivity.distance_km ? `${lastActivity.distance_km}km` : null,
                    lastActivity.moving_time_min ? `${lastActivity.moving_time_min}min` : null,
                    lastActivity.avg_hr ? `♥\u202F${Math.round(lastActivity.avg_hr)}` : null,
                ].filter(Boolean).join('\u202F·\u202F');
                const hrBadge = lastActivity.hr_source === 'whoop'
                    ? `<span class="hr-source-badge">W</span>` : '';
                lastActHtml = `
                    <span class="sport-icon">${icon}</span>
                    <span class="act-name">${escapeHtml(lastActivity.name)}</span>
                    <span class="act-stats">${stats}</span>${hrBadge}
                `;
            }

            el.innerHTML = `
                <div class="recovery-ring" style="border-color:${ringColor};box-shadow:${ringGlow};">
                    ${scoreHtml}
                </div>
                <div class="today-stats">
                    <div class="stat-pills">${pillsHtml || '<span style="color:var(--text-muted);font-size:12px;">Recovery data unavailable</span>'}</div>
                    <div class="last-activity-line">${lastActHtml}</div>
                </div>
            `;
        }

        function renderActivitiesFeed(activities) {
            const el = document.getElementById('activitiesFeed');
            if (!activities || activities.length === 0) {
                el.innerHTML = '<div style="padding:16px 0;font-size:12px;color:var(--text-muted);font-family:\'JetBrains Mono\',monospace;">No recent activities</div>';
                return;
            }
            el.innerHTML = activities.map(a => {
                const icon = sportIcon(a.type);
                const dateStr = a.date ? formatDate(a.date) : '';
                const stats = [
                    a.distance_km ? `${a.distance_km}km` : null,
                    a.moving_time_min ? `${a.moving_time_min}m` : null,
                ].filter(Boolean).join('\u202F·\u202F');
                const hrHtml = a.avg_hr
                    ? `<span class="hr-val"> ·\u202F♥${Math.round(a.avg_hr)}</span>`
                    : '';
                return `
                    <div class="activity-card">
                        <div class="activity-icon">${icon}</div>
                        <div class="activity-main">
                            <div class="activity-name">${escapeHtml(a.name)}</div>
                            <div class="activity-date">${dateStr}</div>
                        </div>
                        <div class="activity-stats">${stats}${hrHtml}</div>
                    </div>
                `;
            }).join('');
        }

        function renderWeekSummary(vol) {
            const el = document.getElementById('weekSummary');
            if (!vol) { el.innerHTML = ''; return; }
            const fmt = (km, min) => {
                if (!km && !min) return { val: '—', dim: true };
                const parts = [km ? `${km}km` : null, min ? `${min}m` : null].filter(Boolean);
                return { val: parts.join('\u202F·\u202F'), dim: false };
            };
            const swim = fmt(vol.swim_km, vol.swim_min);
            const bike = fmt(vol.bike_km, vol.bike_min);
            const run = fmt(vol.run_km, vol.run_min);
            el.innerHTML = `
                <div class="week-sport">
                    <div class="week-sport-icon">🏊</div>
                    <div class="week-sport-data">
                        <div class="week-sport-label">Swim</div>
                        <div class="week-sport-val ${swim.dim ? 'dim' : ''}">${swim.val}</div>
                    </div>
                </div>
                <div class="week-sport">
                    <div class="week-sport-icon">🚴</div>
                    <div class="week-sport-data">
                        <div class="week-sport-label">Bike</div>
                        <div class="week-sport-val ${bike.dim ? 'dim' : ''}">${bike.val}</div>
                    </div>
                </div>
                <div class="week-sport">
                    <div class="week-sport-icon">🏃</div>
                    <div class="week-sport-data">
                        <div class="week-sport-label">Run</div>
                        <div class="week-sport-val ${run.dim ? 'dim' : ''}">${run.val}</div>
                    </div>
                </div>
            `;
        }

        function formatDate(dateStr) {
            try {
                const d = new Date(dateStr);
                return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
            } catch (e) { return dateStr?.slice(0, 10) || ''; }
        }

        // ── Chat ─────────────────────────────────────────────────────────
        function sendSuggestion(chip) {
            messageInput.value = chip.textContent;
            sendMessage();
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isLoading) return;

            if (welcomeState.parentNode) welcomeState.remove();
            clearBtn.style.display = 'block';

            renderMessage(text, 'user');
            messageInput.value = '';
            isLoading = true;
            sendBtn.disabled = true;
            const loadingEl = addLoading();

            try {
                const res = await fetch(`${API_BASE}/agent/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, history: conversationHistory }),
                });
                const data = await res.json();
                loadingEl.remove();

                if (res.ok) {
                    renderMessage(data.response, 'agent');
                    conversationHistory.push({ role: 'user', content: text });
                    conversationHistory.push({ role: 'assistant', content: data.response });
                    if (conversationHistory.length > 20)
                        conversationHistory = conversationHistory.slice(-20);
                    saveHistory(conversationHistory);
                } else {
                    renderMessage(`Error: ${data.detail || 'Something went wrong'}`, 'agent');
                }
            } catch (err) {
                loadingEl.remove();
                renderMessage('Connection error — is the server running?', 'agent');
            }

            isLoading = false;
            sendBtn.disabled = false;
            messageInput.focus();
        }

        // ── Markdown renderer ────────────────────────────────────────────
        function escapeHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function renderMarkdown(text) {
            const codeBlocks = [];
            text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
                const idx = codeBlocks.length;
                codeBlocks.push(`<pre><code class="lang-${lang}">${escapeHtml(code.trim())}</code></pre>`);
                return `\x00CODE${idx}\x00`;
            });
            text = text.replace(/`([^`\n]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`);
            text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*([^*\n]+?)\*/g, '<em>$1</em>');
            text = text.replace(/((?:^- .+\n?)+)/gm, block => {
                const items = block.trim().split('\n').map(l => `<li>${l.replace(/^- /,'')}</li>`).join('');
                return `<ul>${items}</ul>\n`;
            });
            text = text.replace(/((?:^\d+\. .+\n?)+)/gm, block => {
                const items = block.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /,'')}</li>`).join('');
                return `<ol>${items}</ol>\n`;
            });
            text = text.split(/\n\n+/).map(p => p.trim()).filter(Boolean).map(p => {
                if (/^<(h[23]|ul|ol|pre|\x00CODE)/.test(p)) return p;
                return `<p>${p.replace(/\n/g,'<br>')}</p>`;
            }).join('');
            codeBlocks.forEach((b, i) => { text = text.replace(`\x00CODE${i}\x00`, b); });
            return text;
        }

        function renderMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const avatar = role === 'agent' ? '🏋' : '👤';
            const content = role === 'agent' ? renderMarkdown(text) : `<p>${escapeHtml(text)}</p>`;
            div.innerHTML = `
                <div class="msg-avatar">${avatar}</div>
                <div class="msg-content">${content}</div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        function addLoading() {
            const div = document.createElement('div');
            div.className = 'message agent';
            div.innerHTML = `
                <div class="msg-avatar">🏋</div>
                <div class="msg-content"><div class="loading-dots"><span></span><span></span><span></span></div></div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        // ── Connection status ────────────────────────────────────────────
        async function checkStatus() {
            try {
                const res = await fetch(`${API_BASE}/auth/status`);
                const data = await res.json();
                const badge = document.getElementById('statusBadge');
                const stravaOk = data.strava?.authenticated;
                const whoopOk = data.whoop?.authenticated;
                if (stravaOk && whoopOk) {
                    badge.innerHTML = `<div class="status-dot"></div><span>Strava + Whoop</span>`;
                } else if (stravaOk) {
                    badge.innerHTML = `<div class="status-dot"></div><span>Strava only</span>`;
                } else {
                    badge.innerHTML = `<div class="status-dot" style="background:var(--red);animation:none"></div><span>disconnected</span>`;
                    badge.style.cssText += ';border-color:rgba(239,68,68,0.15);background:rgba(239,68,68,0.08);color:var(--red)';
                }
            } catch (e) {}
        }

        // ── Init ─────────────────────────────────────────────────────────
        checkStatus();
        loadDashboard();
        messageInput.focus();
    </script>

</body>
</html>
