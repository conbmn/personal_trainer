<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Agent — Coach</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0b;
            --bg-secondary: #111113;
            --bg-card: #18181b;
            --bg-input: #1e1e22;
            --border: #2a2a2e;
            --text-primary: #f0f0f2;
            --text-secondary: #8b8b94;
            --text-muted: #55555e;
            --accent: #f97316;
            --accent-glow: rgba(249, 115, 22, 0.15);
            --accent-soft: #fb923c;
            --success: #22c55e;
            --user-bg: #1c1917;
            --agent-bg: #111113;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header --- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--accent), #ea580c);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .header-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 300;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            font-size: 12px;
            color: var(--success);
            font-weight: 500;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* --- Chat Area --- */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar {
            width: 4px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .welcome-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 24px;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--accent), #ea580c);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 0 40px var(--accent-glow);
        }

        .welcome-text {
            text-align: center;
        }

        .welcome-text h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .welcome-text p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.5;
            max-width: 400px;
        }

        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-width: 520px;
        }

        .chip {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'DM Sans', sans-serif;
        }

        .chip:hover {
            border-color: var(--accent);
            color: var(--accent-soft);
            background: var(--accent-glow);
            transform: translateY(-1px);
        }

        /* --- Messages --- */
        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: msgIn 0.3s ease;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message.agent .msg-avatar {
            background: linear-gradient(135deg, var(--accent), #ea580c);
        }

        .message.user .msg-avatar {
            background: var(--bg-card);
            border: 1px solid var(--border);
        }

        .msg-content {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.65;
            max-width: 75%;
        }

        .message.user .msg-content {
            background: var(--user-bg);
            border: 1px solid #2a2520;
            color: var(--text-primary);
            border-radius: 12px 12px 2px 12px;
        }

        .message.agent .msg-content {
            background: var(--agent-bg);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 12px 12px 12px 2px;
        }

        .msg-content strong {
            color: var(--accent-soft);
            font-weight: 600;
        }

        .msg-content p {
            margin-bottom: 8px;
        }

        .msg-content p:last-child {
            margin-bottom: 0;
        }

        /* --- Loading --- */
        .loading-dots {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .loading-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: dotBounce 1.2s ease-in-out infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes dotBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* --- Input Area --- */
        .input-area {
            padding: 16px 24px 24px;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 4px 4px 4px 16px;
            transition: border-color 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            padding: 10px 0;
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--accent), #ea580c);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
        }

        .input-hint {
            text-align: center;
            margin-top: 8px;
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="logo-icon">🏋</div>
            <div>
                <div class="header-title">Fitness Agent</div>
                <div class="header-subtitle">AI Training Coach</div>
            </div>
        </div>
        <div class="status-badge" id="statusBadge">
            <div class="status-dot"></div>
            <span>Strava Connected</span>
        </div>
    </div>

    <!-- Chat -->
    <div class="chat-container" id="chatContainer">
        <div class="welcome-state" id="welcomeState">
            <div class="welcome-icon">🚴</div>
            <div class="welcome-text">
                <h2>Hey Coach is ready</h2>
                <p>Ask me anything about your training. I'll pull your real Strava data to give specific, actionable advice.</p>
            </div>
            <div class="suggestion-chips">
                <button class="chip" onclick="sendSuggestion(this)">How was my training this week?</button>
                <button class="chip" onclick="sendSuggestion(this)">Should I rest today?</button>
                <button class="chip" onclick="sendSuggestion(this)">What's my biggest ride this month?</button>
                <button class="chip" onclick="sendSuggestion(this)">Am I overtraining?</button>
            </div>
        </div>
    </div>

    <!-- Input -->
    <div class="input-area">
        <div class="input-wrapper">
            <input
                type="text"
                id="messageInput"
                placeholder="Ask your coach anything..."
                autocomplete="off"
                onkeydown="if(event.key==='Enter') sendMessage()"
            >
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
        <div class="input-hint">Powered by Strava + Whoop + OpenAI</div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeState = document.getElementById('welcomeState');

        let isLoading = false;
        let conversationHistory = [];

        function sendSuggestion(chip) {
            messageInput.value = chip.textContent;
            sendMessage();
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isLoading) return;

            // Hide welcome state
            if (welcomeState) welcomeState.remove();

            // Add user message
            addMessage(text, 'user');
            messageInput.value = '';
            isLoading = true;
            sendBtn.disabled = true;

            // Add loading indicator
            const loadingEl = addLoading();

            try {
                const res = await fetch(`${API_BASE}/agent/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        history: conversationHistory,
                    }),
                });

                const data = await res.json();

                // Remove loading
                loadingEl.remove();

                if (res.ok) {
                    addMessage(data.response, 'agent');
                    // Store both messages in history
                    conversationHistory.push({ role: 'user', content: text });
                    conversationHistory.push({ role: 'assistant', content: data.response });

                    // Keep last 20 messages to avoid token limits
                    if (conversationHistory.length > 20) {
                        conversationHistory = conversationHistory.slice(-20);
                    }
                } else {
                    addMessage(`Error: ${data.detail || 'Something went wrong'}`, 'agent');
                }
            } catch (err) {
                loadingEl.remove();
                addMessage(`Connection error — is the server running on port 8000?`, 'agent');
            }

            isLoading = false;
            sendBtn.disabled = false;
            messageInput.focus();
        }

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;

            const avatar = role === 'agent' ? '🏋' : '👤';

            // Simple markdown-like formatting
            const formatted = text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');

            div.innerHTML = `
                <div class="msg-avatar">${avatar}</div>
                <div class="msg-content"><p>${formatted}</p></div>
            `;

            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        function addLoading() {
            const div = document.createElement('div');
            div.className = 'message agent';
            div.innerHTML = `
                <div class="msg-avatar">🏋</div>
                <div class="msg-content">
                    <div class="loading-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        // Check connection status on load
        async function checkStatus() {
            try {
                const res = await fetch(`${API_BASE}/auth/status`);
                const data = await res.json();
                const badge = document.getElementById('statusBadge');
                const strava = data.strava?.authenticated;
                const whoop = data.whoop?.authenticated;

                if (strava && whoop) {
                    badge.innerHTML = `<div class="status-dot"></div><span>Strava + Whoop</span>`;
                } else if (strava) {
                    badge.innerHTML = `<div class="status-dot"></div><span>Strava Only</span>`;
                } else {
                    badge.innerHTML = `<div class="status-dot" style="background:#ef4444;animation:none"></div><span>Not Connected</span>`;
                    badge.style.borderColor = 'rgba(239,68,68,0.2)';
                    badge.style.background = 'rgba(239,68,68,0.1)';
                    badge.style.color = '#ef4444';
                }
            } catch (e) {
                // Server not running
            }
        }

        checkStatus();
        messageInput.focus();
    </script>

</body>
</html>
